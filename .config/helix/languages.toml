use-grammars = { only = [
	"bash",
	"c",
	"css",
	"diff",
	"html",
	"java",
	"javascript",
	"jsdoc",
	"json",
	"make",
	"markdown",
	"python",
	"rust",
	"sql",
	"toml",
	"typescript",
	"typst",
	"xml",
	"zig",
]}

[[language]]
name = "bash"
indent = { tab-width = 4, unit = "\t"}

